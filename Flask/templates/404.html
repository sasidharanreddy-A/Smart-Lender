<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
</head>
<body>
  <div class="bg-cosmic"></div>

  <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
        <i class="bi bi-bank2 me-1"></i> Smart Lender
      </a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card text-center fade-in py-5" style="border-color: rgba(245,158,11,0.15);">
          <div class="card-body px-4">
            <div class="display-1 fw-bold mb-3" style="background: var(--gradient-warm); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
              404
            </div>
            <div style="font-size: 4rem; margin-bottom: 1rem;">
              <i class="bi bi-emoji-frown" style="color: var(--amber);"></i>
            </div>
            <h2 class="text-white mb-3 fw-bold">Page Not Found</h2>
            <p class="text-white-50 mb-4" style="max-width: 400px; margin: 0 auto;">
              The page you're looking for doesn't exist or has been moved.
              Let's get you back on track.
            </p>
            <div class="d-flex justify-content-center gap-3 flex-wrap">
              <a href="{{ url_for('index') }}" class="btn btn-gradient btn-lg px-5 py-3">
                <i class="bi bi-house-door-fill me-2"></i> Back to Home
              </a>
              <button onclick="history.back()" class="btn btn-glass btn-lg px-4 py-3">
                <i class="bi bi-arrow-left me-2"></i> Go Back
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
